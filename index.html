<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fazenda Damata</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f5f0;color:#2E3C44;}

    /* ── HEADER ─────────────────────────────────── */
    #header{
      width:100%;background:#2E3C44;
      display:flex;align-items:center;justify-content:center;
      gap:16px;padding:18px 32px;
      position:sticky;top:0;z-index:100;
      box-shadow:0 2px 12px rgba(0,0,0,.3);
    }
    #header svg{flex-shrink:0;}
    #header-wordmark{
      display:flex;flex-direction:column;line-height:1;
    }
    #header-wordmark .name{
      font-size:26px;font-weight:800;letter-spacing:6px;color:#fff;
    }
    #header-wordmark .sub{
      font-size:10px;letter-spacing:3px;color:#E8A52A;text-transform:uppercase;margin-top:3px;
    }

    /* ── BOTÕES ──────────────────────────────────── */
    #cta-bar{
      width:100%;background:#1e2d35;
      display:flex;align-items:center;justify-content:center;
      flex-wrap:wrap;gap:10px;padding:14px 24px;
    }
    .cta-btn{
      display:inline-flex;align-items:center;gap:7px;
      padding:9px 20px;border-radius:30px;
      background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);
      color:#fff;font-size:13px;font-weight:600;letter-spacing:.3px;
      text-decoration:none;cursor:pointer;font-family:inherit;
      transition:background .18s,border-color .18s;
      white-space:nowrap;
    }
    .cta-btn:hover{background:rgba(232,165,42,.25);border-color:#E8A52A;color:#E8A52A;}
    .cta-btn.portal{background:rgba(232,165,42,.15);border-color:rgba(232,165,42,.5);color:#E8A52A;}
    .cta-btn.portal:hover{background:#E8A52A;color:#2E3C44;}

    /* ── ÁREA DE INFORMAÇÕES (PDFs em sequência) ─── */
    #info-area{
      width:100%;background:#fff;
      display:flex;flex-direction:column;align-items:center;
    }

    /* container de um PDF — canvas empilhados sem gap */
    .pdf-doc{
      width:100%;max-width:900px;
      display:flex;flex-direction:column;align-items:center;
    }
    .pdf-doc canvas{
      width:100%;
      display:block;
    }

    /* estado de loading/erro */
    #pdf-loading{
      width:100%;padding:48px;text-align:center;
      color:#8A9BA8;font-size:14px;
    }

    /* ── MÍDIA: CARROSSEL + VÍDEOS ───────────────── */
    #media-section{
      width:100%;background:#2E3C44;
      padding:48px 24px;
      display:flex;flex-direction:column;align-items:center;gap:32px;
    }
    #media-section .sec-label{
      font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#E8A52A;
    }
    #ll-media-grid{
      width:100%;max-width:900px;
      display:grid;grid-template-columns:1fr 1fr;gap:12px;
    }
    #ll-carousel-cell{display:flex;flex-direction:column;gap:8px;}
    #ll-carousel-wrap{
      width:100%;aspect-ratio:16/9;border-radius:16px;overflow:hidden;
      position:relative;box-shadow:0 12px 40px rgba(0,0,0,.2);background:rgba(0,0,0,.15);
    }
    .ll-slide{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1s;}
    .ll-slide.on{opacity:1;}
    #ll-dots{display:flex;gap:6px;justify-content:center;}
    .ll-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4);cursor:pointer;transition:background .3s;}
    .ll-dot.on{background:#fff;}
    .ll-vid{width:100%;aspect-ratio:16/9;border-radius:16px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.2);background:rgba(0,0,0,.15);}
    .ll-vid iframe{width:100%;height:100%;border:none;display:block;}
    .ll-vid-empty{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.45);font-size:12px;}
    @media(max-width:640px){#ll-media-grid{grid-template-columns:1fr;}}

    /* ── FOOTER ──────────────────────────────────── */
    #footer{
      width:100%;background:#1a252d;
      padding:20px;text-align:center;
      font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1px;
    }

    /* ── RESPONSIVO ──────────────────────────────── */
    @media(max-width:640px){
      #header{padding:14px 20px;}
      #header-wordmark .name{font-size:20px;letter-spacing:4px;}
      #videos-ph{grid-template-columns:1fr;}
      #carousel-ph{height:220px;}
    }
  </style>
</head>
<body>

<!-- SVG symbols -->
<svg width="0" height="0" style="position:absolute">
  <symbol id="logo-sym-lt" viewBox="0 0 100 96">
    <path d="M50,4 C62,3 76,8 85,18 C94,28 96,42 92,56 C88,70 77,82 62,88 C47,94 30,92 18,83 C6,74 2,58 5,44 C8,30 18,16 32,9 C40,5 46,4 50,4 Z" stroke="#E8A52A" stroke-width="2.6" fill="none"/>
    <path d="M50,14 C60,13 72,17 80,26 C88,35 90,47 86,59 C82,71 73,79 60,84 C47,89 32,86 22,78 C12,70 9,56 12,44 C15,32 24,20 36,15 C42,12 47,14 50,14 Z" stroke="#E8A52A" stroke-width="2.3" fill="none"/>
    <path d="M50,23 C58,22 68,26 75,33 C82,41 83,52 80,62 C77,72 69,79 58,82 C47,85 35,81 27,74 C19,67 17,55 20,44 C23,34 31,24 42,21 C46,20 49,23 50,23 Z" stroke="#E8A52A" stroke-width="2.0" fill="none"/>
    <path d="M50,32 C56,31 64,34 69,40 C75,47 75,57 72,65 C69,72 62,77 53,79 C44,81 35,77 29,70 C23,63 22,53 25,44 C28,36 36,29 44,28 C47,27 49,32 50,32 Z" stroke="#E8A52A" stroke-width="1.8" fill="none"/>
    <path d="M50,41 C54,40 59,43 62,48 C65,53 64,60 61,64 C58,68 53,70 48,69 C43,68 38,64 36,59 C34,54 35,47 39,43 C42,40 47,41 50,41 Z" stroke="#E8A52A" stroke-width="1.5" fill="none"/>
    <circle cx="50" cy="55" r="4" fill="#E8A52A"/>
  </symbol>
</svg>

<!-- ① HEADER -->
<header id="header">
  <svg width="52" height="50"><use href="#logo-sym-lt"/></svg>
  <div id="header-wordmark">
    <span class="name">DAMATA</span>
  </div>
</header>

<!-- ② BOTÕES -->
<nav id="cta-bar">
  <a class="cta-btn" href="#">📋 Fazer Orçamento</a>
  <a class="cta-btn" href="https://wa.me/5519996383386" target="_blank">💬 WhatsApp</a>
  <a class="cta-btn" href="https://instagram.com/damatafazenda" target="_blank">📷 Instagram</a>
  <a class="cta-btn" href="https://maps.app.goo.gl/B2KEUapfKFutrrKKA" target="_blank">📍 Como chegar</a>
  <a class="cta-btn portal" href="/admin.html#login">🔐 Portal</a>
</nav>

<!-- ③ ÁREA DE INFORMAÇÕES (PDFs renderizados como canvas) -->
<section id="info-area">
  <div id="pdf-loading">Carregando informações…</div>
</section>

<!-- ④ CARROSSEL + VÍDEOS -->
<section id="media-section">
  <p class="sec-label">Fotos & Vídeos</p>
  <div id="ll-media-grid">
    <div id="ll-carousel-cell">
      <div id="ll-carousel-wrap">
        <div id="ll-no-photo" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);font-size:13px">Carregando fotos…</div>
      </div>
      <div id="ll-dots"></div>
    </div>
    <div class="ll-vid" id="ll-vid-0"></div>
    <div class="ll-vid" id="ll-vid-1"></div>
    <div class="ll-vid" id="ll-vid-2"></div>
  </div>
</section>

<footer id="footer">FAZENDA DAMATA · Mogi Mirim · SP</footer>

<script>
const SB_URL = "https://wwnndsprpofmgbklqdgg.supabase.co";
const SB_KEY = "sb_publishable__RQxBa8P-lryd0LtWgTJPw_-aSWERWK";
const PDFJS_URL = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
const PDFJS_WORKER = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

async function loadPdfList() {
  try {
    const res = await fetch(SB_URL + "/rest/v1/app_config?chave=eq.landing_pdfs&select=valor", {
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
    });
    const data = await res.json();
    const v = data && data[0] && data[0].valor;
    return Array.isArray(v) ? v : [];
  } catch (_) { return []; }
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function renderPdf(pdfEntry, container) {
  const url = typeof pdfEntry === "string" ? pdfEntry : pdfEntry.url;
  if (!url) return;

  const wrapper = document.createElement("div");
  wrapper.className = "pdf-doc";
  container.appendChild(wrapper);

  try {
    const loadingTask = pdfjsLib.getDocument({ url, withCredentials: false });
    const pdf = await loadingTask.promise;

    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
      const page = await pdf.getPage(pageNum);
      const vp = page.getViewport({ scale: 1 });
      // Scale to fill container width (900px max, actual rendered width)
      const containerWidth = Math.min(container.clientWidth || 900, 900);
      const scale = containerWidth / vp.width;
      const viewport = page.getViewport({ scale });

      const canvas = document.createElement("canvas");
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      canvas.style.width = "100%";
      wrapper.appendChild(canvas);

      await page.render({ canvasContext: canvas.getContext("2d"), viewport }).promise;
    }
  } catch (e) {
    const err = document.createElement("p");
    err.style.cssText = "color:#e74c3c;font-size:13px;padding:16px;text-align:center";
    err.textContent = "Erro ao carregar PDF.";
    wrapper.appendChild(err);
    console.error("PDF render error:", e);
  }
}

let _llTimer = null, _llIdx = 0;

async function loadLandingCarousel() {
  let urls = [];
  try {
    const res = await fetch(SB_URL + "/rest/v1/app_config?chave=eq.fotos_landing&select=valor", {
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
    });
    const data = await res.json();
    const raw = (data && data[0] && Array.isArray(data[0].valor)) ? data[0].valor : [];
    const arr = raw.map(x => typeof x === "string" ? x : x.url).filter(u => u && u.trim());
    if (arr.length) urls = arr.map(u => /^https?:\/\//i.test(u) ? u : ('./' + u.replace(/^\.?\//,'')));
  } catch(_) {}

  const wrap = document.getElementById("ll-carousel-wrap");
  const dots = document.getElementById("ll-dots");
  const noPhoto = document.getElementById("ll-no-photo");
  if (noPhoto) noPhoto.remove();
  if (!urls.length) {
    wrap.innerHTML = '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.3);font-size:13px">Fotos em breve</div>';
    return;
  }
  wrap.innerHTML = "";
  dots.innerHTML = "";
  urls.forEach((u, i) => {
    const img = document.createElement("img");
    img.src = u; img.className = "ll-slide" + (i === 0 ? " on" : "");
    wrap.appendChild(img);
    const d = document.createElement("div");
    d.className = "ll-dot" + (i === 0 ? " on" : ""); d.onclick = () => llGoto(i);
    dots.appendChild(d);
  });
  if (urls.length > 1) {
    clearInterval(_llTimer);
    _llTimer = setInterval(() => llGoto((_llIdx + 1) % urls.length), 4000);
  }
}

function llGoto(i) {
  const slides = document.querySelectorAll(".ll-slide");
  const dotEls = document.querySelectorAll(".ll-dot");
  if (!slides.length) return;
  slides[_llIdx].classList.remove("on");
  dotEls[_llIdx]?.classList.remove("on");
  _llIdx = i;
  slides[_llIdx].classList.add("on");
  dotEls[_llIdx]?.classList.add("on");
}

function _ytId(url) {
  if (!url) return null;
  const m = String(url).match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/|v\/))([\w-]{11})/);
  if (m) return m[1];
  const m2 = String(url).match(/[?&]v=([\w-]{11})/);
  return m2 ? m2[1] : null;
}

async function loadLandingVideos() {
  let urls = [];
  try {
    const res = await fetch(SB_URL + "/rest/v1/app_config?chave=eq.videos_landing&select=valor", {
      headers: { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY }
    });
    const data = await res.json();
    if (data && data[0] && Array.isArray(data[0].valor)) urls = data[0].valor;
  } catch(_) {}
  for (let i = 0; i < 3; i++) {
    const cell = document.getElementById("ll-vid-" + i);
    if (!cell) continue;
    const id = _ytId(urls[i]);
    if (id) {
      cell.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}" title="Vídeo Fazenda Damata" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
    } else {
      cell.innerHTML = `<div class="ll-vid-empty">Vídeo em breve</div>`;
    }
  }
}

async function init() {
  const infoArea = document.getElementById("info-area");
  const loading = document.getElementById("pdf-loading");

  // Carrossel e vídeos carregam em paralelo
  loadLandingCarousel();
  loadLandingVideos();

  const pdfList = await loadPdfList();

  if (!pdfList.length) {
    loading.textContent = "";
    return;
  }

  try {
    await loadScript(PDFJS_URL);
    pdfjsLib.GlobalWorkerOptions.workerSrc = PDFJS_WORKER;
  } catch (_) {
    loading.textContent = "Erro ao carregar visualizador de PDF.";
    return;
  }

  loading.remove();

  for (const entry of pdfList) {
    await renderPdf(entry, infoArea);
  }
}

init();
</script>
</body>
</html>
